<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WCM279QHL5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WCM279QHL5');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} - {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}" />

  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/images/logo.jpg' | relative_url }}" type="image/jpg" />

  <!-- Fonts -->
  <link href="https://fonts.cdnfonts.com/css/lovelo" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@600&display=swap" rel="stylesheet" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/blog.css' | relative_url }}" />

  <!-- Adsense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5329847300488443" crossorigin="anonymous"></script>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg border-bottom sticky-top bg-white">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="{{ '/' | relative_url }}">
        <img id="logoimg" src="{{ '/assets/images/logo.jpg' | relative_url }}" alt="DTransit logo" />
        <span class="ms-2">That (D)Transit Blog by DTransit</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMenu">
        <ul class="navbar-nav me-auto mb-2 mb-md-0 ms-4">
          <li class="nav-item"><a class="nav-link" href="https://dtransit-main.github.io/thatdtransitblog">Blog Home</a></li>
        </ul>
        <ul class="navbar-nav ms-auto mb-2 mb-md-0">
          <li class="nav-item"><a class="nav-link" href="https://youtube.com/@DTransit" target="_blank"><i class="bi bi-youtube"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="https://x.com/dtransit_" target="_blank"><i class="bi bi-twitter-x"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="https://instagram.com/dtransit_" target="_blank"><i class="bi bi-instagram"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="https://facebook.com/people/DTransit/61572642970067/" target="_blank"><i class="bi bi-facebook"></i></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row">
    {% for post in site.posts %}
        <div class="col-md-4 mb-4">
        <article class="card shadow-sm blog-card h-100 d-flex flex-column">
            {% if post.cover %}
            <img src="{{ post.cover | relative_url }}" class="card-img-top" alt="{{ post.title }} cover image" />
            {% endif %}
            <div class="card-body d-flex flex-column">
            <h3 class="card-title">
                <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
            </h3>
            <p class="card-text text-muted">{{ post.date | date: "%B %d, %Y" }}</p>
            <p class="card-text">{{ post.excerpt }}</p>
            <a href="{{ post.url | relative_url }}" class="btn btn-primary mt-auto">Read More</a>
            </div>
        </article>
        </div>
    {% endfor %}
    </div>
  </main>

  <footer>
    <p>© 2025 DTransit</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
